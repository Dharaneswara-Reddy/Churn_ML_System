paths:
  raw_data: "data/Telco_customer_churn_raw.csv"
  retraining_data: "data/retraining_dataset.csv"
  training_reference: "data/training_reference.csv"
  production_model: "models/production/current/model.pkl"
  experiments_dir: "models/experiments"

inference:
  threshold: 0.5

api:
  # slowapi format, e.g. "60/minute", "100/hour"
  rate_limit: "120/minute"

mlflow:
  # Prefer DB-backed tracking/registry (filesystem stores deprecated in MLflow 2026)
  tracking_uri: "sqlite:///./mlruns/mlflow.db"
  experiment_name: "churn_training"
  registered_model_name: "churn_model"

event_store:
  # sqlite URL; swap for Postgres in production (e.g. postgresql+psycopg://...)
  database_url: "sqlite:///./data/churn_events.db"

logging:
  api: "api.log"
  training: "training.log"
  monitoring: "monitoring.log"
  lifecycle: "lifecycle.log"

scheduler:
  interval_seconds: 60